# GitHub Pages Configuration for Easy Logikal
# (Este archivo no se usa en GitHub Pages, solo para referencia)

# Para GitHub Pages, la carpeta raíz del proyecto se sirve como-está
# No hay build ni configuración adicional necesaria

# Los archivos HTML se sirven directamente desde el repositorio
# URL base: https://oscartadeogo.github.io/easy-logikal-web/

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
